<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT01 · Gestor de proyecto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:8px}
.topbar-badge{font-size:11px;background:#E6F1FB;color:#0C447C;padding:2px 8px;border-radius:10px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px;font-size:12px;color:#888}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#639922;display:inline-block;margin-right:4px}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
.sync-dot.error{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.container{max-width:1100px;margin:0 auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat-section{background:#fff;border-radius:12px;padding:16px;border:1px solid #e5e5e3}
.stat-section-title{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-weight:600}
.stat-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-card{background:#f5f5f3;border-radius:8px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:600;color:#1a1a1a}
.stat-lbl{font-size:10px;color:#888;margin-top:2px}
.person-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.person-chip{border-radius:10px;padding:12px 8px;cursor:pointer;border:1.5px solid #e5e5e3;background:#fff;transition:border-color .15s}
.person-chip:hover{border-color:#ccc}
.person-chip.active{border-width:2px}
.person-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin:0 auto 7px}
.person-chip-name{font-size:12px;font-weight:600;color:#1a1a1a;text-align:center}
.person-stats{display:flex;justify-content:center;gap:6px;margin-top:4px}
.ps-num{font-size:11px;color:#888}
.missed-badge{display:inline-block;margin-top:5px;font-size:10px;padding:2px 7px;border-radius:8px;background:#FCEBEB;color:#791F1F;font-weight:600}
.bar-wrap{height:3px;background:#eee;border-radius:2px;margin-top:5px}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.main-tabs{display:flex;gap:2px;border-bottom:1px solid #e5e5e3}
.main-tab{padding:9px 16px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#888;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-weight:500}
.main-tab.active{color:#1a1a1a;border-bottom-color:#185FA5}
.week-tabs{display:flex;gap:4px;background:#f5f5f3;border-radius:8px;padding:4px}
.week-tab{flex:1;padding:6px 4px;border-radius:6px;font-size:11px;cursor:pointer;border:none;background:transparent;color:#888;font-family:inherit;text-align:center;transition:all .15s;font-weight:500}
.week-tab.active{background:#fff;color:#1a1a1a;font-weight:600;border:1px solid #e5e5e3}
.cal-wrap{overflow-x:auto;border-radius:10px;border:1px solid #e5e5e3}
.cal-table{width:100%;border-collapse:collapse;min-width:620px;background:#fff}
.cal-table th{font-size:11px;font-weight:600;color:#888;padding:8px 4px;text-align:center;border-bottom:1px solid #e5e5e3;border-right:1px solid #f0f0f0;background:#fafaf8}
.cal-table td{vertical-align:top;border-bottom:1px solid #e5e5e3;border-right:1px solid #f0f0f0;padding:3px}
.time-cell{font-size:10px;color:#666;padding:6px 7px;text-align:right;background:#fafaf8;white-space:nowrap;width:58px;font-weight:600;vertical-align:middle;border-right:1px solid #e5e5e3}
.legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-size:10px;color:#888}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block}
.sp-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;border:1px solid transparent}
.report-card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:16px}
.report-task-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f3}
.report-task-row:last-child{border-bottom:none}
.filter-chip{font-size:11px;padding:5px 10px;border-radius:10px;cursor:pointer;border:1px solid #e5e5e3;background:transparent;color:#888;font-family:inherit;transition:all .1s;font-weight:500}
.filter-chip.active{background:#185FA5;color:#fff;border-color:#185FA5}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;width:380px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:16px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fl{font-size:11px;color:#888;font-weight:500}
.fi{padding:8px 10px;border:1px solid #e5e5e3;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;width:100%;outline:none}
.fi:focus{border-color:#185FA5}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mac{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;border:1px solid #e5e5e3;background:transparent;color:#1a1a1a;transition:all .1s}
.btn:hover{background:#f5f5f3}
.btn-p{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-p:hover{background:#0C447C;border-color:#0C447C}
.btn-d{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn-d:hover{background:#791F1F}
.pct-row{display:flex;align-items:center;gap:8px}
.pct-row input[type=range]{flex:1;accent-color:#185FA5}
.pct-val{font-size:12px;font-weight:600;color:#1a1a1a;min-width:36px}
.sp-checks{display:flex;flex-direction:column;gap:6px;max-height:120px;overflow-y:auto;border:1px solid #e5e5e3;border-radius:8px;padding:8px}
.sp-check-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#1a1a1a;cursor:pointer}
.sp-check-item input{accent-color:#185FA5;cursor:pointer}
.evidence-list{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.evidence-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#185FA5;padding:4px 7px;background:#E6F1FB;border-radius:6px}
.evidence-item a{color:#185FA5;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.evidence-item a:hover{text-decoration:underline}
.ev-del{background:none;border:none;color:#A32D2D;cursor:pointer;font-size:14px;padding:0;line-height:1}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.missed-day-chip{font-size:10px;background:#FCEBEB;color:#791F1F;padding:2px 7px;border-radius:8px;display:inline-block;margin:2px;font-weight:500}
.section-label{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.section-sub{font-size:10px;color:#888;font-weight:500;margin-bottom:4px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    LT01
    <span class="topbar-badge">Proyecto general</span>
  </div>
  <div class="topbar-right">
    <span id="sync-indicator"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Conectando...</span></span>
    <span id="topbar-date"></span>
  </div>
</div>

<div class="container" id="app"></div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const SUPABASE_URL='https://lyxpcbrbyhzgxoyjvoxi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5eHBjYnJieWh6Z3hveWp2b3hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MjYwODUsImV4cCI6MjA5MzUwMjA4NX0.GCJPRfMR7MLoNiDGo1ATEHGCMzWE7iPC_QIe-AV2dGU';
const STORAGE_URL=SUPABASE_URL+'/storage/v1';

const PERSONS=[
  {id:'g',name:'Gabriela',initial:'G',initials:'GA',color:'#185FA5',bg:'#E6F1FB',tc:'#0C447C'},
  {id:'a',name:'Anayeli',initial:'A',initials:'AN',color:'#0F6E56',bg:'#E1F5EE',tc:'#085041'},
  {id:'f',name:'Fernanda',initial:'F',initials:'FE',color:'#993C1D',bg:'#FAECE7',tc:'#712B13'},
  {id:'e',name:'Enrique',initial:'E',initials:'EN',color:'#854F0B',bg:'#FAEEDA',tc:'#633806'}
];
const PRIO=[
  {n:1,label:'P1',color:'#E24B4A',bg:'#FCEBEB',tc:'#791F1F'},
  {n:2,label:'P2',color:'#EF9F27',bg:'#FAEEDA',tc:'#633806'},
  {n:3,label:'P3',color:'#639922',bg:'#EAF3DE',tc:'#27500A'},
  {n:4,label:'P4',color:'#378ADD',bg:'#E6F1FB',tc:'#0C447C'},
  {n:5,label:'P5',color:'#888780',bg:'#F1EFE8',tc:'#444441'}
];
const SUBPROJECTS=[
  {id:'general',code:'LT01',desc:'LT01 - Proyecto general',color:'#5F5E5A',bg:'#F1EFE8',tc:'#2C2C2A'},
  {id:'A',code:'LandingPad',desc:'LandingPad',color:'#534AB7',bg:'#EEEDFE',tc:'#26215C'},
  {id:'B',code:'SeleClonal',desc:'Seleccion Clonal',color:'#0F6E56',bg:'#E1F5EE',tc:'#04342C'},
  {id:'C',code:'HA-CHO',desc:'HA-CHO',color:'#993C1D',bg:'#FAECE7',tc:'#4A1B0C'},
  {id:'D',code:'PracticasFer',desc:'Practicas Fernanda',color:'#185FA5',bg:'#E6F1FB',tc:'#042C53'}
];
const DAYS=['Lun','Mar','Mie','Jue','Vie','Sab'];

function buildSlots(){
  var s=[{key:'pre',label:'Antes 8am',hour:-1}];
  for(var h=8;h<=19;h++) s.push({key:h+':00',label:h+':00',hour:h});
  s.push({key:'post',label:'Despues 7pm',hour:99});
  return s;
}
var TIME_SLOTS=buildSlots();

function timeToMinutes(str){
  if(!str) return null;
  var parts=str.split(':');
  return parseInt(parts[0])*60+(parseInt(parts[1])||0);
}
function taskStartSlot(t){
  if(!t.time_start) return t.slot||'pre';
  var m=timeToMinutes(t.time_start);
  var h=Math.floor(m/60);
  if(h<8) return 'pre';
  if(h>=19) return 'post';
  return h+':00';
}

var state={view:'home',mainTab:'calendario',weekOffset:0,selectedPerson:null,reportFilter:'person',tasks:[]};

var hdrs={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

function apiFetch(path,opts){
  opts=opts||{};
  setSyncing(true);
  var fetchOpts={headers:hdrs};
  if(opts.method) fetchOpts.method=opts.method;
  if(opts.body) fetchOpts.body=opts.body;
  return fetch(SUPABASE_URL+'/rest/v1/'+path,fetchOpts)
    .then(function(r){
      setSyncing(false);
      if(!r.ok) return r.text().then(function(e){throw new Error(e);});
      var ct=r.headers.get('content-type')||'';
      return ct.indexOf('json')>=0?r.json():null;
    }).catch(function(e){setSyncing(false);throw e;});
}

function loadTasks(){
  return apiFetch('tasks?select=*&order=date.asc')
    .then(function(data){
      state.tasks=data||[];
      setSync('ok');
      render();
    }).catch(function(){setSync('error');showToast('Error al cargar tareas');});
}

function createTask(t){
  return apiFetch('tasks',{method:'POST',body:JSON.stringify(t)})
    .then(function(res){
      if(res&&res[0]) state.tasks.push(res[0]);
      render();showToast('Tarea creada');
    }).catch(function(e){showToast('Error al guardar');});
}

function updateTask(id,changes){
  return apiFetch('tasks?id=eq.'+id,{method:'PATCH',body:JSON.stringify(changes)})
    .then(function(res){
      var idx=state.tasks.findIndex(function(t){return t.id===id;});
      if(idx>=0&&res&&res[0]) state.tasks[idx]=res[0];
      render();
    }).catch(function(){showToast('Error al actualizar');});
}

function deleteTask(id){
  return apiFetch('tasks?id=eq.'+id,{method:'DELETE'})
    .then(function(){
      state.tasks=state.tasks.filter(function(t){return t.id!==id;});
      closeModal();render();showToast('Tarea eliminada');
    }).catch(function(){showToast('Error al eliminar');});
}

function moveToNextDay(id){
  var t=state.tasks.find(function(x){return x.id===id;});
  if(!t) return;
  var d=new Date(t.date+'T12:00:00');
  d.setDate(d.getDate()+1);
  var newDate=dateKey(d);
  var missed=(t.missed_dates||[]).slice();
  if(missed.indexOf(t.date)<0) missed.push(t.date);
  closeModal();
  updateTask(id,{date:newDate,missed_dates:missed}).then(function(){showToast('Tarea movida al '+fmtDateShort(newDate));});
}

function markDone(id){
  var t=state.tasks.find(function(x){return x.id===id;});
  if(!t) return;
  var newDone=!t.done;
  closeModal();
  updateTask(id,{done:newDone,pct:newDone?100:t.pct}).then(function(){showToast(newDone?'Tarea completada':'Tarea reabierta');});
}

function uploadEvidence(taskId,file){
  var path=taskId+'/'+Date.now()+'_'+file.name;
  setSyncing(true);
  return fetch(STORAGE_URL+'/object/evidence/'+path,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':file.type},
    body:file
  }).then(function(r){
    setSyncing(false);
    if(!r.ok) throw new Error('Upload failed');
    var t=state.tasks.find(function(x){return x.id===taskId;});
    var evs=(t.evidence_paths||[]).slice();
    evs.push(path);
    return updateTask(taskId,{evidence_paths:evs});
  }).then(function(){showToast('Evidencia subida');})
  .catch(function(){setSyncing(false);showToast('Error al subir archivo');});
}

function deleteEvidence(taskId,path){
  return fetch(STORAGE_URL+'/object/evidence/'+path,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  }).then(function(){
    var t=state.tasks.find(function(x){return x.id===taskId;});
    var evs=(t.evidence_paths||[]).filter(function(p){return p!==path;});
    return updateTask(taskId,{evidence_paths:evs});
  }).then(function(){showToast('Evidencia eliminada');})
  .catch(function(){showToast('Error al eliminar evidencia');});
}

function evidenceUrl(path){return STORAGE_URL+'/object/public/evidence/'+path;}

function setSyncing(v){
  var dot=document.getElementById('sync-dot');
  var txt=document.getElementById('sync-text');
  if(!dot) return;
  dot.className='sync-dot'+(v?' syncing':'');
  txt.textContent=v?'Sincronizando...':'Sincronizado';
}
function setSync(s){
  var dot=document.getElementById('sync-dot');
  var txt=document.getElementById('sync-text');
  if(!dot) return;
  if(s==='ok'){dot.className='sync-dot';txt.textContent='Sincronizado';}
  else{dot.className='sync-dot error';txt.textContent='Sin conexion';}
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

function getWeekStart(offset){
  var now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+(offset*7));
  mon.setHours(0,0,0,0);return mon;
}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return d.toLocaleDateString('es-MX',{day:'numeric',month:'short'});}
function fmtDateShort(str){
  if(!str) return '';
  var d=new Date(str+'T12:00:00');
  return d.toLocaleDateString('es-MX',{day:'numeric',month:'short'});
}
function weekLabel(o){var s=getWeekStart(o),e=addDays(s,5);return fmtDate(s)+' - '+fmtDate(e);}
function dateKey(d){return d.toISOString().slice(0,10);}
function todayKey(){return dateKey(new Date());}

function autoMoveTasks(){
  var today=todayKey();
  var toMove=state.tasks.filter(function(t){return !t.done&&t.date<today;});
  var p=Promise.resolve();
  toMove.forEach(function(t){
    p=p.then(function(){
      var missed=(t.missed_dates||[]).slice();
      if(missed.indexOf(t.date)<0) missed.push(t.date);
      return updateTask(t.id,{date:today,missed_dates:missed});
    });
  });
  return p;
}

function calcStats(tasks){
  var total=tasks.length,done=tasks.filter(function(t){return t.done;}).length;
  var pct=total?Math.round((done/total)*100):0;
  return{total:total,done:done,pct:pct};
}
function getMissedCount(pid){
  return state.tasks.filter(function(t){return t.person===pid&&t.missed_dates&&t.missed_dates.length>0;}).length;
}
function getMissedByDay(pid){
  var map={};
  state.tasks.filter(function(t){return t.person===pid&&t.missed_dates&&t.missed_dates.length>0;})
    .forEach(function(t){(t.missed_dates||[]).forEach(function(d){map[d]=(map[d]||0)+1;});});
  return map;
}
function getTasksForWeek(pid,offset){
  var s=getWeekStart(offset);
  var keys=[];for(var i=0;i<6;i++) keys.push(dateKey(addDays(s,i)));
  return state.tasks.filter(function(t){return t.person===pid&&keys.indexOf(t.date)>=0;});
}

function spBadges(sps){
  if(!sps||!sps.length) return '';
  return sps.map(function(sid){
    var sp=SUBPROJECTS.find(function(x){return x.id===sid;});
    if(!sp) return '';
    return '<span class="sp-badge" style="background:'+sp.bg+';color:'+sp.tc+';border-color:'+sp.color+'">'+sp.code+'</span>';
  }).join(' ');
}

var modalTask=null;
function openModal(opts){
  opts=opts||{};
  modalTask=opts.editId?state.tasks.find(function(t){return t.id===opts.editId;}):null;
  var t=modalTask;
  var defPerson=t?t.person:(opts.prefPerson||PERSONS[0].id);
  var defDate=t?t.date:(opts.prefDate||todayKey());
  var defPrio=t?t.priority:1;
  var defTs=t&&t.time_start?t.time_start:'08:00';
  var defTe=t&&t.time_end?t.time_end:'';
  var defPct=t?t.pct:0;
  var defDesc=t?t.description:'';
  var defSPs=t&&t.subprojects?t.subprojects:[];
  var evs=t&&t.evidence_paths?t.evidence_paths:[];

  var personOpts=PERSONS.map(function(p){return '<option value="'+p.id+'"'+(defPerson===p.id?' selected':'')+'>'+p.name+'</option>';}).join('');
  var prioOpts=PRIO.map(function(p){return '<option value="'+p.n+'"'+(defPrio===p.n?' selected':'')+'>'+p.label+' - '+['Alta','Media-alta','Media','Baja','Minima'][p.n-1]+'</option>';}).join('');
  var spChecks=SUBPROJECTS.map(function(sp){
    return '<label class="sp-check-item"><input type="checkbox" class="sp-cb" value="'+sp.id+'"'+(defSPs.indexOf(sp.id)>=0?' checked':'')+'><span class="sp-badge" style="background:'+sp.bg+';color:'+sp.tc+';border-color:'+sp.color+'">'+sp.code+'</span><span>'+sp.desc+'</span></label>';
  }).join('');
  var evHtml='';
  if(t){
    var evItems=evs.map(function(path){
      var fname=path.split('/').pop();
      return '<div class="evidence-item"><a href="'+evidenceUrl(path)+'" target="_blank">'+fname+'</a><button class="ev-del" onclick="deleteEvidence(\''+t.id+'\',\''+path+'\')" title="Eliminar">x</button></div>';
    }).join('');
    evHtml='<div class="fg"><div class="fl">Evidencias</div><div class="evidence-list">'+evItems+'</div><input type="file" id="m-evidence" multiple style="margin-top:6px;font-size:12px" accept="image/*,.pdf,.xlsx,.csv,.txt"></div>';
  }
  var delBtn=t?'<button class="btn btn-d" onclick="deleteTask(\''+t.id+'\')">Eliminar</button>':'';
  var actionBtns=t?
    '<div style="display:flex;gap:8px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #e5e5e3;">'+
      '<button class="btn" style="flex:1;font-size:11px;" onclick="moveToNextDay(\'' +t.id+ '\')">Dia siguiente</button>'+
      '<button class="btn" style="flex:1;font-size:11px;background:'+(t.done?'#7C3AED':'#f0eeff')+';color:'+(t.done?'#fff':'#4C1D95')+';border-color:#7C3AED;" onclick="markDone(\'' +t.id+ '\')">'+

function saveModalTask(editId){
  var desc=document.getElementById('m-desc').value.trim();
  if(!desc) return;
  var person=document.getElementById('m-person').value;
  var date=document.getElementById('m-date').value;
  var priority=parseInt(document.getElementById('m-priority').value);
  var time_start=document.getElementById('m-tstart').value||'';
  var time_end=document.getElementById('m-tend').value||'';
  var pct=parseInt(document.getElementById('m-pct').value);
  var subprojects=Array.from(document.querySelectorAll('.sp-cb:checked')).map(function(x){return x.value;});
  var done=pct===100;
  var slot=time_start||'pre';
  var payload={description:desc,person:person,date:date,slot:slot,priority:priority,time_start:time_start,time_end:time_end,pct:pct,done:done,subprojects:subprojects};
  var evInput=document.getElementById('m-evidence');
  closeModal();
  if(editId){
    updateTask(editId,payload).then(function(){
      if(evInput&&evInput.files.length>0){
        var p=Promise.resolve();
        Array.from(evInput.files).forEach(function(f){p=p.then(function(){return uploadEvidence(editId,f);});});
        return p;
      }
    });
  } else {
    payload.missed_dates=[];
    payload.evidence_paths=[];
    createTask(payload);
  }
}

function renderCalendar(filterPid){
  var ws=getWeekStart(state.weekOffset);
  var dates=[];for(var i=0;i<6;i++) dates.push(addDays(ws,i));
  var dkeys=dates.map(dateKey);
  var today=todayKey();

  var START_H=8, END_H=19;
  var TOTAL_HOURS=END_H-START_H; // 11 hours
  var ROW_PX=52; // px per hour
  var PRE_H=32, POST_H=32; // px for pre/post rows
  var TOTAL_PX=TOTAL_HOURS*ROW_PX;
  var COL_W=170; // min px per day column

  function tMin(str){ if(!str) return null; var p=str.split(':'); return parseInt(p[0])*60+(parseInt(p[1])||0); }
  function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

  // Layout tasks for one day using a column-based overlap algorithm (like Google Calendar)
  function layoutDay(tasks){
    // Sort by start time
    var items=tasks.map(function(t){
      var sm=tMin(t.time_start), em=tMin(t.time_end);
      var special=(!t.time_start||!t.time_end||sm===null||em===null);
      return {t:t, sm:special?null:sm, em:special?null:em, col:0, maxCol:1, special:special};
    });

    // Separate special (no time) from timed
    var timed=items.filter(function(x){return !x.special;}).sort(function(a,b){return a.sm-b.sm;});
    var special=items.filter(function(x){return x.special;});

    // Assign columns via sweep
    var cols=[]; // cols[c] = end time of last task in column c
    timed.forEach(function(item){
      var placed=false;
      for(var c=0;c<cols.length;c++){
        if(cols[c]<=item.sm){ item.col=c; cols[c]=item.em; placed=true; break; }
      }
      if(!placed){ item.col=cols.length; cols.push(item.em); }
    });

    // Assign maxCol (total columns in overlapping group)
    timed.forEach(function(item){
      var mc=1;
      timed.forEach(function(other){
        if(other!==item && other.sm<item.em && other.em>item.sm){
          mc=Math.max(mc,other.col+1);
        }
      });
      item.maxCol=Math.max(item.col+1,mc);
    });

    return {timed:timed, special:special, numCols:cols.length||1};
  }

  // Build HTML for one day column
  function dayHtml(dk){
    var dayTasks=state.tasks.filter(function(t){
      return t.date===dk&&(filterPid?t.person===filterPid:true);
    });
    var layout=layoutDay(dayTasks);
    var numCols=Math.max(layout.numCols,1);
    var isToday=dk===today;
    var bg=isToday?'#fafeff':'#fff';

    var html='<div style="position:relative;height:'+(PRE_H+TOTAL_PX+POST_H)+'px;background:'+bg+';min-width:'+COL_W+'px;">';

    // Hour grid lines
    for(var h=0;h<=TOTAL_HOURS;h++){
      var y=PRE_H+h*ROW_PX;
      html+='<div style="position:absolute;left:0;right:0;top:'+y+'px;border-top:1px solid '+(h===0?'#e5e5e3':'#f0f0f0')+';pointer-events:none"></div>';
    }

    // Special tasks (no time) at top
    layout.special.forEach(function(item){
      var t=item.t;
      var p=PERSONS.find(function(x){return x.id===t.person;});
      var pr=PRIO[t.priority-1];
      html+='<div onclick="openModal({editId:\''+t.id+'\'})" style="position:absolute;top:2px;left:2px;right:2px;height:26px;background:'+pr.bg+';border-left:3px solid '+pr.color+';border-radius:4px;padding:2px 4px;cursor:pointer;z-index:2;font-size:9px;overflow:hidden;'+(t.done?'opacity:.5;':'')+'">';
      html+='<span style="background:'+pr.color+';color:#fff;padding:0 2px;border-radius:2px;font-size:8px;font-weight:700">'+pr.label+'</span> ';
      html+='<span style="background:'+p.bg+';color:'+p.tc+';padding:0 2px;border-radius:2px;font-size:8px;font-weight:700;border:1px solid '+p.color+'">'+p.initial+'</span> ';
      html+='<span style="font-weight:600;color:'+pr.tc+'">'+t.description+'</span>';
      html+='</div>';
    });

    // Timed tasks as positioned bars
    layout.timed.forEach(function(item){
      var t=item.t;
      var p=PERSONS.find(function(x){return x.id===t.person;});
      var pr=PRIO[t.priority-1];
      var smC=clamp(item.sm, START_H*60, END_H*60);
      var emC=clamp(item.em, START_H*60, END_H*60);
      var topPx=PRE_H+(smC-START_H*60)/60*ROW_PX;
      var heightPx=Math.max((emC-smC)/60*ROW_PX-2, 20);
      var colW=100/item.maxCol;
      var leftPct=item.col*colW;
      var timeStr=t.time_start+'-'+t.time_end;
      var evMark=t.evidence_paths&&t.evidence_paths.length>0?' +'+t.evidence_paths.length+'f':'';
      var movMark=t.missed_dates&&t.missed_dates.length>0?' m'+t.missed_dates.length+'x':'';
      html+='<div onclick="openModal({editId:\''+t.id+'\'})" title="'+t.description+' ('+timeStr+')" style="'+
        'position:absolute;'+
        'top:'+topPx+'px;'+
        'height:'+heightPx+'px;'+
        'left:'+leftPct+'%;'+
        'width:'+(colW-0.5)+'%;'+
        'background:'+(t.done?'#EDE9FE':pr.bg)+';'+
        'border-left:3px solid '+(t.done?'#7C3AED':pr.color)+';'+
        'border-radius:4px;'+
        'padding:2px 4px;'+
        'cursor:pointer;'+
        'overflow:hidden;'+
        'box-sizing:border-box;'+
        'font-size:9px;line-height:1.3;z-index:2;'+
        (t.done?'opacity:.5;':'')+
      '">';
      html+='<div style="display:flex;align-items:center;gap:2px;flex-wrap:wrap">';
      html+='<span style="background:'+pr.color+';color:#fff;padding:0 2px;border-radius:2px;font-size:8px;font-weight:700">'+pr.label+'</span>';
      html+='<span style="background:'+p.bg+';color:'+p.tc+';padding:0 2px;border-radius:2px;font-size:8px;font-weight:700;border:1px solid '+p.color+'">'+p.initial+'</span>';
      html+=spBadges(t.subprojects);
      html+='</div>';
      if(heightPx>30){
        html+='<div style="font-weight:600;color:'+pr.tc+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t.description+'</div>';
      }
      if(heightPx>44){
        html+='<div style="font-size:8px;color:'+pr.tc+';opacity:.8">'+timeStr+evMark+movMark+'</div>';
        html+='<div style="height:2px;background:rgba(0,0,0,.1);border-radius:1px;margin-top:2px"><div style="height:100%;width:'+t.pct+'%;background:'+pr.color+'"></div></div>';
      }
      html+='</div>';
    });

    // Add-task invisible overlay per hour
    for(var h2=0;h2<TOTAL_HOURS;h2++){
      var hk=(START_H+h2)+':00';
      var ty=PRE_H+h2*ROW_PX;
      html+='<div onclick="openModal({prefDate:\''+dk+'\',prefSlot:\''+hk+'\''+(filterPid?',prefPerson:\''+filterPid+'\'':'')+'})" '+
        'style="position:absolute;left:0;right:0;top:'+ty+'px;height:'+ROW_PX+'px;cursor:cell;z-index:1;" '+
        'title="Agregar tarea '+(START_H+h2)+':00"></div>';
    }

    html+='</div>';
    return html;
  }

  // Time axis column
  function timeAxisHtml(){
    var html='<div style="position:relative;height:'+(PRE_H+TOTAL_PX+POST_H)+'px;width:62px;flex-shrink:0;">';
    html+='<div style="position:absolute;top:0;height:'+PRE_H+'px;right:8px;font-size:9px;color:#bbb;display:flex;align-items:center;">Antes 8am</div>';
    for(var h=0;h<=TOTAL_HOURS;h++){
      var y=PRE_H+h*ROW_PX;
      var label=(START_H+h)+':00';
      if(START_H+h>19) continue;
      html+='<div style="position:absolute;top:'+(y-7)+'px;right:8px;font-size:9px;color:#888;font-weight:600;white-space:nowrap;">'+label+'</div>';
    }
    html+='<div style="position:absolute;bottom:0;height:'+POST_H+'px;right:8px;font-size:9px;color:#bbb;display:flex;align-items:center;">Desp. 7pm</div>';
    html+='</div>';
    return html;
  }

  // Legend
  var legendHtml='<div class="legend" style="margin-bottom:10px">'+
    PRIO.map(function(p){return '<span class="legend-item"><span class="legend-dot" style="background:'+p.color+'"></span>'+p.label+'</span>';}).join('')+
    '<span style="margin-left:8px;display:flex;gap:4px">'+PERSONS.map(function(p){return '<span style="background:'+p.bg+';color:'+p.tc+';padding:1px 6px;border-radius:4px;border:1px solid '+p.color+';font-size:10px;font-weight:600">'+p.initial+'</span>';}).join('')+'</span>'+
    '<span style="display:flex;gap:4px">'+SUBPROJECTS.map(function(sp){return '<span class="sp-badge" style="background:'+sp.bg+';color:'+sp.tc+';border-color:'+sp.color+'">'+sp.code+'</span>';}).join('')+'</span>'+
  '</div>';

  // Day headers
  var headersHtml='<div style="display:flex;margin-left:62px;min-width:'+(dkeys.length*COL_W)+'px;">';
  dates.forEach(function(d,i){
    var dk=dkeys[i];
    var allT=state.tasks.filter(function(t){return t.date===dk&&(filterPid?t.person===filterPid:true);});
    var missed=allT.filter(function(t){return t.missed_dates&&t.missed_dates.length>0;}).length;
    var dDone=allT.filter(function(t){return t.done;}).length;
    var dTotal=allT.length;
    var isToday=dk===today;
    headersHtml+='<div style="flex:1;min-width:'+COL_W+'px;text-align:center;padding:6px 2px;font-size:11px;font-weight:600;color:#888;border-bottom:1px solid #e5e5e3;border-right:1px solid #f0f0f0;'+(isToday?'background:#E6F1FB;':'')+'">';
    headersHtml+=DAYS[i]+'<br><span style="font-weight:400;font-size:10px">'+fmtDate(d)+'</span>';
    if(dTotal>0) headersHtml+='<br><span style="font-size:10px;background:'+(dDone===dTotal&&dTotal>0?'#7C3AED':'#f0eeff')+';color:'+(dDone===dTotal&&dTotal>0?'#fff':'#4C1D95')+';padding:1px 6px;border-radius:8px;font-weight:600">'+dDone+'/'+dTotal+' ✓</span>';
    if(missed>0) headersHtml+='<br><span style="font-size:9px;background:#FCEBEB;color:#791F1F;padding:1px 4px;border-radius:5px;font-weight:600">'+missed+' incumpl.</span>';
    headersHtml+='</div>';
  });
  headersHtml+='</div>';

  // Body: time axis + day columns
  var bodyHtml='<div style="display:flex;overflow-x:auto;">';
  bodyHtml+=timeAxisHtml();
  bodyHtml+='<div style="display:flex;flex:1;min-width:'+(dkeys.length*COL_W)+'px;border-left:1px solid #e5e5e3;">';
  dates.forEach(function(d,i){
    var dk=dkeys[i];
    bodyHtml+='<div style="flex:1;min-width:'+COL_W+'px;border-right:1px solid #f0f0f0;">';
    bodyHtml+=dayHtml(dk);
    bodyHtml+='</div>';
  });
  bodyHtml+='</div></div>';

  return legendHtml+
    '<div style="border-radius:10px;border:1px solid #e5e5e3;overflow:hidden;background:#fff;">'+
      headersHtml+
      '<div style="overflow-x:auto;">'+
        '<div style="display:flex;min-width:'+(62+dkeys.length*COL_W)+'px;">'+
          timeAxisHtml()+
          '<div style="display:flex;flex:1;min-width:'+(dkeys.length*COL_W)+'px;border-left:1px solid #e5e5e3;">'+
          dkeys.map(function(dk,i){
            return '<div style="flex:1;min-width:'+COL_W+'px;border-right:1px solid #f0f0f0;">'+dayHtml(dk)+'</div>';
          }).join('')+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
}

          (missed>0?'<span class="missed-badge">'+missed+' incumplida'+(missed>1?'s':'')+'</span>':'')+
        '</div>'+
        '<div class="bar-wrap" style="height:5px;margin-bottom:12px"><div class="bar-fill" style="width:'+s.pct+'%;background:'+p.color+'"></div></div>'+
        taskRows+missedSection+
      '</div>';
    });
  } else {
    SUBPROJECTS.forEach(function(sp){
      var spTasks=state.tasks.filter(function(t){return t.subprojects&&t.subprojects.indexOf(sp.id)>=0;});
      var s=calcStats(spTasks);
      var taskRows=spTasks.length===0?'<div style="font-size:12px;color:#aaa;text-align:center;padding:10px">Sin tareas en este subproyecto</div>':
        spTasks.slice().sort(function(a,b){return a.date.localeCompare(b.date);}).map(function(t){
          var pr=PRIO[t.priority-1];
          var per=PERSONS.find(function(x){return x.id===t.person;});
          return '<div class="report-task-row">'+
            '<span style="font-size:9px;background:'+pr.color+';color:#fff;padding:2px 5px;border-radius:3px;font-weight:600;flex-shrink:0;margin-top:2px">'+pr.label+'</span>'+
            '<span style="font-size:9px;background:'+per.bg+';color:'+per.tc+';padding:2px 5px;border-radius:3px;border:1px solid '+per.color+';font-weight:600;flex-shrink:0;margin-top:2px">'+per.initial+'</span>'+
            '<div style="flex:1;min-width:0">'+
              '<div style="font-size:12px;font-weight:600'+(t.done?';text-decoration:line-through;opacity:.5':'')+'">'+ t.description+'</div>'+
              '<div style="font-size:10px;color:#888;margin-top:2px">'+fmtDateShort(t.date)+(t.time_start?' - '+t.time_start+'-'+t.time_end:'')+'</div>'+
              (t.missed_dates&&t.missed_dates.length>0?'<div style="font-size:9px;color:#791F1F;font-style:italic">Movida '+t.missed_dates.length+'x</div>':'')+
            '</div>'+
            '<span style="font-size:12px;font-weight:600;color:'+(t.done?'#27500A':'#888')+';flex-shrink:0">'+t.pct+'%</span>'+
          '</div>';
        }).join('');
      html+='<div class="report-card" style="margin-bottom:10px">'+
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'+
          '<span class="sp-badge" style="font-size:13px;padding:4px 10px;background:'+sp.bg+';color:'+sp.tc+';border-color:'+sp.color+'">'+sp.code+'</span>'+
          '<div style="flex:1"><div style="font-size:14px;font-weight:600">'+sp.desc+'</div><div style="font-size:11px;color:#888">'+s.done+'/'+s.total+' tareas - '+s.pct+'%</div></div>'+
        '</div>'+
        '<div class="bar-wrap" style="height:5px;margin-bottom:12px"><div class="bar-fill" style="width:'+s.pct+'%;background:'+sp.color+'"></div></div>'+
        taskRows+
      '</div>';
    });
  }
  return html;
}

function render(){
  var app=document.getElementById('app');
  if(state.view==='home'){
    var calBody=state.mainTab==='calendario'?renderWeekTabs('home')+renderCalendar(null):renderReports();
    app.innerHTML=
      renderHomeStats()+
      '<div><div class="section-label">Tareas por persona - semana actual</div><div class="section-sub">Clic en una persona para ver su calendario individual</div></div>'+
      renderPersonRow()+
      '<div style="display:flex;align-items:center;justify-content:space-between">'+
        '<div style="font-size:15px;font-weight:600">LT01 - '+(state.mainTab==='calendario'?weekLabel(state.weekOffset):'Reporte general')+'</div>'+
        (state.mainTab==='calendario'?'<button class="btn btn-p" onclick="openModal()" style="font-size:12px">+ Nueva tarea</button>':'')+
      '</div>'+
      '<div class="main-tabs">'+
        '<button class="main-tab'+(state.mainTab==='calendario'?' active':'')+'" onclick="setMainTab(\'calendario\')">Calendario</button>'+
        '<button class="main-tab'+(state.mainTab==='reportes'?' active':'')+'" onclick="setMainTab(\'reportes\')">Reportes</button>'+
      '</div>'+
      '<div>'+calBody+'</div>';
  } else {
    var p=PERSONS.find(function(x){return x.id===state.selectedPerson;});
    var s=calcStats(getTasksForWeek(p.id,state.weekOffset));
    var missed=getMissedCount(p.id);
    var missedMap=getMissedByDay(p.id);
    var missedDays=Object.keys(missedMap).sort();
    var missedSection=missedDays.length>0?
      '<div style="background:#FCEBEB;border-radius:8px;padding:10px 14px">'+
        '<div style="font-size:11px;color:#791F1F;font-weight:600;margin-bottom:5px">Tareas incumplidas por dia</div>'+
        missedDays.map(function(d){return '<span class="missed-day-chip">'+fmtDateShort(d)+': '+missedMap[d]+' tarea'+(missedMap[d]>1?'s':'')+'</span>';}).join('')+
      '</div>':'';
    app.innerHTML=
      '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'+
        '<div style="width:38px;height:38px;border-radius:50%;background:'+p.bg+';color:'+p.tc+';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600">'+p.initials+'</div>'+
        '<div><div style="font-size:16px;font-weight:600">'+p.name+'</div><div style="font-size:12px;color:#888">'+s.done+'/'+s.total+' tareas - '+s.pct+'% completado esta semana</div>'+(missed>0?'<span class="missed-badge">'+missed+' tarea'+(missed>1?'s':'')+' incumplida'+(missed>1?'s':'')+'</span>':'')+'</div>'+
        '<div style="margin-left:auto;display:flex;gap:8px"><button class="btn" onclick="goHome()">Volver</button><button class="btn btn-p" onclick="openModal({prefPerson:\''+p.id+'\'})">+ Nueva tarea</button></div>'+
      '</div>'+
      missedSection+
      '<div><div class="section-label">Tareas por persona - semana actual</div><div class="section-sub">Clic en otra persona para cambiar vista</div></div>'+
      renderPersonRow()+
      renderWeekTabs('person')+
      renderCalendar(p.id);
  }
}

function setMainTab(t){state.mainTab=t;render();}
function setReportFilter(f){state.reportFilter=f;render();}
function openPersonView(id){state.view='person';state.selectedPerson=id;state.weekOffset=0;render();}
function goHome(){state.view='home';render();}
function setWeek(o,v){state.weekOffset=o;state.view=v==='person'?'person':'home';render();}

document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
setInterval(loadTasks,30000);
loadTasks().then(function(){autoMoveTasks();});
</script>
</body>
</html>
