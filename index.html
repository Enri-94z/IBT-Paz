*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:8px}
.topbar-badge{font-size:11px;background:#E6F1FB;color:#0C447C;padding:2px 8px;border-radius:10px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px;font-size:12px;color:#888}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#639922;display:inline-block;margin-right:4px}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
.sync-dot.error{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.container{max-width:1100px;margin:0 auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat-section{background:#fff;border-radius:12px;padding:16px;border:1px solid #e5e5e3}
.stat-section-title{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-weight:600}
.stat-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-card{background:#f5f5f3;border-radius:8px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:600;color:#1a1a1a}
.stat-lbl{font-size:10px;color:#888;margin-top:2px}
.person-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.person-chip{border-radius:10px;padding:12px 8px;cursor:pointer;border:1.5px solid #e5e5e3;background:#fff;transition:border-color .15s}
.person-chip:hover{border-color:#ccc}
.person-chip.active{border-width:2px}
.person-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin:0 auto 7px}
.person-chip-name{font-size:12px;font-weight:600;color:#1a1a1a;text-align:center}
.person-stats{display:flex;justify-content:center;gap:6px;margin-top:4px}
.ps-num{font-size:11px;color:#888}
.missed-badge{display:inline-block;margin-top:5px;font-size:10px;padding:2px 7px;border-radius:8px;background:#FCEBEB;color:#791F1F;font-weight:600}
.bar-wrap{height:3px;background:#eee;border-radius:2px;margin-top:5px}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.main-tabs{display:flex;gap:2px;border-bottom:1px solid #e5e5e3}
.main-tab{padding:9px 16px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#888;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-weight:500}
.main-tab.active{color:#1a1a1a;border-bottom-color:#185FA5}
.week-tabs{display:flex;gap:4px;background:#f5f5f3;border-radius:8px;padding:4px}
.week-tab{flex:1;padding:6px 4px;border-radius:6px;font-size:11px;cursor:pointer;border:none;background:transparent;color:#888;font-family:inherit;text-align:center;transition:all .15s;font-weight:500}
.week-tab.active{background:#fff;color:#1a1a1a;font-weight:600;border:1px solid #e5e5e3}
.cal-wrap{overflow-x:auto;border-radius:10px;border:1px solid #e5e5e3}
.cal-table{width:100%;border-collapse:collapse;min-width:600px;background:#fff}
.cal-table th{font-size:11px;font-weight:600;color:#888;padding:8px 4px;text-align:center;border-bottom:1px solid #e5e5e3;border-right:1px solid #f0f0f0;background:#fafaf8}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}

.fi{padding:8px 10px;border:1px solid #e5e5e3;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;width:100%;outline:none}

.mac{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

.btn-d{background:#A32D2D;color:#fff;border-color:#A32D2D}

.pct-row{display:flex;align-items:center;gap:8px}
.pct-row input[type=range]{flex:1;accent-color:#185FA5}
.pct-val{font-size:12px;font-weight:600;color:#1a1a1a;min-width:36px}
.sp-checks{display:flex;flex-direction:column;gap:6px;max-height:120px;overflow-y:auto;border:1px solid #e5e5e3;border-radius:8px;padding:8px}
.sp-check-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#1a1a1a;cursor:pointer}
.sp-check-item input{accent-color:#185FA5;cursor:pointer}

.evidence-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#185FA5;padding:4px 7px;background:#E6F1FB;border-radius:6px}

.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.missed-day-chip{font-size:10px;background:#FCEBEB;color:#791F1F;padding:2px 7px;border-radius:8px;display:inline-block;margin:2px;font-weight:500}

// Filas por hora completa: pre, 8:00..19:00, post
function buildSlots(){
  const s=[{key:'pre',label:'Antes 8am',hour:-1}];
  for(let h=8;h<=19;h++) s.push({key:`${h}:00`,label:`${h}:00`,hour:h});
  s.push({key:'post',label:'Después 7pm',hour:99});
  return s;
}
const TIME_SLOTS=buildSlots();

function timeToMinutes(str){
  if(!str)return null;
  const [h,m]=str.split(':').map(Number);
  return h*60+(m||0);
}
function slotHour(slot){return slot.hour;}

// Which hour slot does a task belong to (by start time)
function taskStartSlot(t){
  if(!t.time_start) return t.slot||'pre';
  const m=timeToMinutes(t.time_start);
  const h=Math.floor(m/60);
  if(h<8) return 'pre';
  if(h>=19) return 'post';
  return `${h}:00`;
}

function renderCalendar(filterPid){
  const ws=getWeekStart(state.weekOffset);
  const dates=Array.from({length:6},(_,i)=>addDays(ws,i));
  const dkeys=dates.map(dateKey);

  // Build task map: slotKey -> dayKey -> [tasks]
  const taskMap={};
  TIME_SLOTS.forEach(s=>{taskMap[s.key]={};dkeys.forEach(dk=>{taskMap[s.key][dk]=[];});});
  state.tasks.filter(t=>dkeys.includes(t.date)&&(filterPid?t.person===filterPid:true)).forEach(t=>{
    const sk=taskStartSlot(t);
    if(taskMap[sk]&&taskMap[sk][t.date]!==undefined) taskMap[sk][t.date].push(t);
  });

  let html=`<div class="legend" style="margin-bottom:10px">
    ${PRIO.map(p=>`<span class="legend-item"><span class="legend-dot" style="background:${p.color}"></span>${p.label}</span>`).join('')}
    <span style="margin-left:8px;display:flex;gap:4px">${PERSONS.map(p=>`<span style="background:${p.bg};color:${p.tc};padding:1px 6px;border-radius:4px;border:1px solid ${p.color};font-size:10px;font-weight:600">${p.initial}</span>`).join('')}</span>
    <span style="display:flex;gap:4px">${SUBPROJECTS.map(sp=>`<span class="sp-badge" style="background:${sp.bg};color:${sp.tc};border-color:${sp.color}">${sp.code}</span>`).join('')}</span>
  </div>
  <div class="cal-wrap"><table class="cal-table">
    <thead><tr><th style="width:58px"></th>${dates.map((d,i)=>{
      const dk=dkeys[i];
      const allT=state.tasks.filter(t=>t.date===dk&&(filterPid?t.person===filterPid:true));
      const missed=allT.filter(t=>t.missed_dates&&t.missed_dates.length>0).length;
      const isToday=dk===todayKey();
      return`<th style="${isToday?'background:#E6F1FB;':''}">
        ${DAYS[i]}<br><span style="font-weight:400;font-size:10px">${fmtDate(d)}</span>
        ${missed>0?`<br><span style="font-size:9px;background:#FCEBEB;color:#791F1F;padding:1px 4px;border-radius:5px;font-weight:600">${missed} incumpl.</span>`:''}
      </th>`;
    }).join('')}</tr></thead><tbody>`;

  TIME_SLOTS.forEach(slot=>{
    const isExtra=slot.key==='pre'||slot.key==='post';
    html+=`<tr>
      <td class="time-cell" style="${isExtra?'color:#bbb;font-size:9px;':'font-weight:600;color:#666;'}border-top:1px solid #e5e5e3;">${slot.label}</td>`;
    dkeys.forEach(dk=>{
      const isToday=dk===todayKey();
      const tasks=(taskMap[slot.key]&&taskMap[slot.key][dk])||[];
      tasks.sort((a,b)=>a.priority-b.priority);
      html+=`<td style="${isToday?'background:#fafeff;':''}border-top:1px solid #e5e5e3;padding:3px;vertical-align:top;">`;
      if(tasks.length>0){
        // Horizontal layout: flex row, each task is a pill
        html+=`<div style="display:flex;flex-wrap:wrap;gap:3px;">`;
        tasks.forEach(t=>{
          const p=PERSONS.find(x=>x.id===t.person);
          const pr=PRIO[t.priority-1];
          const timeStr=t.time_start&&t.time_end?`${t.time_start}–${t.time_end}`:'';
          const evCount=t.evidence_paths&&t.evidence_paths.length>0?` · ${t.evidence_paths.length}arch`:'';
          const missed=t.missed_dates&&t.missed_dates.length>0?` · mov${t.missed_dates.length}x`:'';
          html+=`<div onclick="openModal({editId:'${t.id}'})" title="${t.description}${timeStr?' ('+timeStr+')':''}" style="
            background:${pr.bg};border-left:3px solid ${pr.color};border-radius:4px;
            padding:3px 6px;cursor:pointer;font-size:10px;line-height:1.35;
            min-width:80px;max-width:160px;flex:1;
            ${t.done?'opacity:.5;':''}">
            <div style="display:flex;align-items:center;gap:2px;flex-wrap:wrap;margin-bottom:1px">
              <span style="background:${pr.color};color:#fff;padding:0 3px;border-radius:2px;font-size:8px;font-weight:700">${pr.label}</span>
              <span style="background:${p.bg};color:${p.tc};padding:0 3px;border-radius:2px;font-size:8px;font-weight:700;border:1px solid ${p.color}">${p.initial}</span>
              ${spBadges(t.subprojects)}
            </div>
            <div style="font-weight:600;color:${pr.tc};${t.done?'text-decoration:line-through;':''};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.description}</div>
            ${timeStr?`<div style="font-size:9px;color:${pr.tc};opacity:.75">${timeStr}${evCount}${missed}</div>`:''}
            <div style="height:2px;background:rgba(0,0,0,.1);border-radius:1px;margin-top:2px">
              <div style="height:100%;width:${t.pct}%;background:${pr.color};border-radius:1px"></div>
            </div>
          </div>`;
        });
        html+=`</div>`;
      }
      html+=`<button style="width:100%;background:none;border:none;color:#ddd;font-size:14px;cursor:pointer;padding:1px 0;line-height:1;opacity:0;transition:opacity .1s;display:block"

      html+=`</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;

      return`<div class="report-card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="width:30px;height:30px;border-radius:50%;background:${p.bg};color:${p.tc};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600">${p.initials}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600">${p.name}</div>
            <div style="font-size:11px;color:#888">${s.done}/${s.total} tareas · ${s.pct}% completado</div>
          </div>
          ${missed>0?`<span class="missed-badge">${missed} incumplida${missed>1?'s':''}</span>`:''}
        </div>
        <div class="bar-wrap" style="height:5px;margin-bottom:12px"><div class="bar-fill" style="width:${s.pct}%;background:${p.color}"></div></div>
        ${ptasks.length===0?'<div style="font-size:12px;color:#aaa;text-align:center;padding:10px">Sin tareas registradas</div>':
          ptasks.sort((a,b)=>a.date.localeCompare(b.date)).map(t=>{
            const pr=PRIO[t.priority-1];
            const evCount=t.evidence_paths&&t.evidence_paths.length>0?`<span style="font-size:10px;color:#185FA5">${t.evidence_paths.length} archivo${t.evidence_paths.length>1?'s':''}</span>`:'';
            return`<div class="report-task-row">
              <span style="font-size:9px;background:${pr.color};color:#fff;padding:2px 5px;border-radius:3px;font-weight:600;flex-shrink:0;margin-top:2px">${pr.label}</span>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:600;color:#1a1a1a${t.done?';text-decoration:line-through;opacity:.5':''}">${t.description}</div>
                <div style="font-size:10px;color:#888;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap">
                  <span>${fmtDateShort(t.date)}</span>
                  ${t.time_start?`<span>${t.time_start}–${t.time_end}</span>`:''}
                  <span>${spBadges(t.subprojects)||'—'}</span>
                  ${evCount}
                </div>
                ${t.missed_dates&&t.missed_dates.length>0?`<div style="font-size:9px;color:#791F1F;font-style:italic;margin-top:2px">Movida ${t.missed_dates.length}x · ${t.missed_dates.map(fmtDateShort).join(', ')}</div>`:''}
              </div>
              <span style="font-size:12px;font-weight:600;color:${t.done?'#27500A':'#888'};flex-shrink:0">${t.pct}%</span>
            </div>`;
          }).join('')}
        ${missedDays.length>0?`<div style="margin-top:10px;padding-top:8px;border-top:1px solid #f5f5f3">
          <div style="font-size:10px;color:#888;margin-bottom:4px;font-weight:600">Incumplimientos por día</div>
          ${missedDays.map(d=>`<span class="missed-day-chip">${fmtDateShort(d)}: ${missedMap[d]}</span>`).join('')}
        </div>`:''}
      </div>`;
    }).join('');
  } else {
    html+=SUBPROJECTS.map(sp=>{
      const spTasks=state.tasks.filter(t=>t.subprojects&&t.subprojects.includes(sp.id));
      const s=calcStats(spTasks);
      return`<div class="report-card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span class="sp-badge" style="font-size:13px;padding:4px 10px;background:${sp.bg};color:${sp.tc};border-color:${sp.color}">${sp.code}</span>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600">${sp.desc}</div>
            <div style="font-size:11px;color:#888">${s.done}/${s.total} tareas · ${s.pct}%</div>
          </div>
        </div>
        <div class="bar-wrap" style="height:5px;margin-bottom:12px"><div class="bar-fill" style="width:${s.pct}%;background:${sp.color}"></div></div>
        ${spTasks.length===0?'<div style="font-size:12px;color:#aaa;text-align:center;padding:10px">Sin tareas en este subproyecto</div>':
          spTasks.sort((a,b)=>a.date.localeCompare(b.date)).map(t=>{
            const pr=PRIO[t.priority-1];
            const per=PERSONS.find(x=>x.id===t.person);
            return`<div class="report-task-row">
              <span style="font-size:9px;background:${pr.color};color:#fff;padding:2px 5px;border-radius:3px;font-weight:600;flex-shrink:0;margin-top:2px">${pr.label}</span>
              <span style="font-size:9px;background:${per.bg};color:${per.tc};padding:2px 5px;border-radius:3px;border:1px solid ${per.color};font-weight:600;flex-shrink:0;margin-top:2px">${per.initial}</span>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:600${t.done?';text-decoration:line-through;opacity:.5':''}">${t.description}</div>
                <div style="font-size:10px;color:#888;margin-top:2px">${fmtDateShort(t.date)}${t.time_start?` · ${t.time_start}–${t.time_end}`:''}</div>
                ${t.missed_dates&&t.missed_dates.length>0?`<div style="font-size:9px;color:#791F1F;font-style:italic">Movida ${t.missed_dates.length}x</div>`:''}
              </div>
              <span style="font-size:12px;font-weight:600;color:${t.done?'#27500A':'#888'};flex-shrink:0">${t.pct}%</span>
            </div>`;
          }).join('')}
      </div>`;
    }).join('');
  }
  return html;
}

// ── Main render ───────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(state.view==='home'){
    app.innerHTML=`
      ${renderHomeStats()}
      <div>
        <div style="font-size:15px;font-weight:600;color:#1a1a1a">Tareas por persona · semana actual</div>
        <div style="font-size:10px;color:#888;font-weight:500;margin-top:1px">Clic en una persona para ver su calendario individual</div>
      </div>
      ${renderPersonRow()}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:15px;font-weight:600">LT01 · ${state.mainTab==='calendario'?weekLabel(state.weekOffset):'Reporte general'}</div>
        </div>
        ${state.mainTab==='calendario'?`<button class="btn btn-p" onclick="openModal()" style="font-size:12px">+ Nueva tarea</button>`:''}
      </div>
      <div class="main-tabs">
        <button class="main-tab${state.mainTab==='calendario'?' active':''}" onclick="setMainTab('calendario')">Calendario</button>
        <button class="main-tab${state.mainTab==='reportes'?' active':''}" onclick="setMainTab('reportes')">Reportes</button>
      </div>
      <div>
        ${state.mainTab==='calendario'?renderWeekTabs('home')+renderCalendar(null):renderReports()}
      </div>`;
  } else {
    const p=PERSONS.find(x=>x.id===state.selectedPerson);
    const s=calcStats(getTasksForWeek(p.id,state.weekOffset));
    const missed=getMissedCount(p.id);
    const missedMap=getMissedByDay(p.id);
    const missedDays=Object.keys(missedMap).sort();
    app.innerHTML=`
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="width:38px;height:38px;border-radius:50%;background:${p.bg};color:${p.tc};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600">${p.initials}</div>
        <div>
          <div style="font-size:16px;font-weight:600">${p.name}</div>
          <div style="font-size:12px;color:#888">${s.done}/${s.total} tareas · ${s.pct}% completado esta semana</div>
          ${missed>0?`<span class="missed-badge">${missed} tarea${missed>1?'s':''} incumplida${missed>1?'s':''}</span>`:''}
        </div>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn" onclick="goHome()">← Volver</button>
          <button class="btn btn-p" onclick="openModal({prefPerson:'${p.id}'})">+ Nueva tarea</button>
        </div>
      </div>
      ${missedDays.length>0?`<div style="background:#FCEBEB;border-radius:8px;padding:10px 14px">
        <div style="font-size:11px;color:#791F1F;font-weight:600;margin-bottom:5px">Tareas incumplidas por día</div>
        ${missedDays.map(d=>`<span class="missed-day-chip">${fmtDateShort(d)}: ${missedMap[d]} tarea${missedMap[d]>1?'s':''}</span>`).join('')}
      </div>`:''}
      ${renderPersonRow()}
      ${renderWeekTabs('person')}
      ${renderCalendar(p.id)}`;
  }
}

function setMainTab(t){state.mainTab=t;render();}
function setReportFilter(f){state.reportFilter=f;render();}
function openPersonView(id){state.view='person';state.selectedPerson=id;state.weekOffset=0;render();}
function goHome(){state.view='home';render();}
function setWeek(o,v){state.weekOffset=o;state.view=v==='person'?'person':'home';render();}

// ── Init ──────────────────────────────────────────────────────
document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});

loadTasks().then(()=>autoMoveTasks());
</script>
</body>
</html>
